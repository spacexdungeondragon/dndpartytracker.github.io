<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curse of Strahd - Party Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>⚰️ Curse of Strahd ⚰️</h1>
            <p class="tagline">A Tale of Darkness and Despair</p>
            <div class="button-group">
                <button id="add-loot" class="btn btn-gold">🗝️ Add Loot</button>
                <button id="add-quest" class="btn btn-crimson">⚔️ Add Quest</button>
                <button id="sync-status" class="btn btn-gold" disabled>🔄 Connecting...</button>
            </div>
        </div>
    </header>

    <main>
        <section id="quests" class="card">
            <h2>⚔️ Active Quests</h2>
            <ul id="quests-list" class="item-list">
                <!-- Quests will be added here -->
            </ul>
        </section>

        <section id="loot" class="card">
            <h2>💰 Treasures & Loot</h2>
            <ul id="loot-list" class="item-list">
                <!-- Loot items will be added here -->
            </ul>
        </section>

        <section id="story" class="card">
            <h2>📖 Chronicle of Events</h2>
            <textarea id="story-text" rows="12" placeholder="Record the dark deeds and haunting tales of your journey through Barovia..."></textarea>
        </section>
    </main>

    <footer>
        <p>May the mists of Barovia guide your path...</p>
    </footer>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBD2zEBCmVRRVBKroDWKsJ9S7oXBPuzGgs",
            authDomain: "dnd-curse-of-strahd.firebaseapp.com",
            projectId: "dnd-curse-of-strahd",
            storageBucket: "dnd-curse-of-strahd.firebasestorage.app",
            messagingSenderId: "1003543560913",
            appId: "1:1003543560913:web:7eea96491d237038bc7bf0",
            measurementId: "G-0V2V3CQ8K5"
        };

        // Initialize Firebase
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            document.getElementById('sync-status').textContent = '☁️ Connected';
            document.getElementById('sync-status').classList.remove('btn-gold');
            document.getElementById('sync-status').classList.add('btn-crimson');
        } catch (error) {
            console.error('Firebase initialization failed:', error);
            document.getElementById('sync-status').textContent = '❌ Offline Mode';
            document.getElementById('sync-status').style.backgroundColor = 'rgba(255, 107, 107, 0.3)';
        }

        // Load the main application script
        import('./scripts-firebase.js')
            .then(() => {
                console.log('Firebase scripts loaded successfully');
            })
            .catch(error => {
                console.error('Error loading Firebase scripts:', error);
                // Fallback to localStorage version
                import('./scripts.js');
            });
    </script>
</body>
</html>
